version: '3.8'

services:
  backend:
    build: ./Back
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - API_KEY=${API_KEY}
    restart: always
    depends_on:
      - db

  frontend:
    build:
      context: ./Front/Library
      args:
        VITE_API_KEY: ${API_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    
  db:
    build: ./Database
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=library
    ports:
      - '5432:5432'
    volumes: 
      - db:/var/lib/postgresql/data
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db:
    driver: local
